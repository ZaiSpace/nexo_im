---
- name: Deploy nexo_im with Ansible + Supervisor
  hosts: nexo
  become: true
  tasks:
    - name: Ensure runtime directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ deploy_root }}"
        - "{{ app_root }}"
        - "{{ shared_root }}"
        - "{{ log_root }}"
        - "{{ shared_root }}/rollback"
        - "{{ shared_root }}/rollback/{{ app_name }}"

    - name: Check current nexo_im binary for rollback
      ansible.builtin.stat:
        path: "{{ app_root }}/bin/nexo_im"
      register: nexo_im_current_bin

    - name: Backup current nexo_im binary
      ansible.builtin.command: >
        cp -a
        "{{ app_root }}/bin/nexo_im"
        "{{ shared_root }}/rollback/{{ app_name }}/nexo_im.bak"
      when: nexo_im_current_bin.stat.exists
      changed_when: true

    - name: Deploy and restart nexo_im
      block:
        - name: Sync repository to target host
          ansible.posix.synchronize:
            src: "{{ ((playbook_dir + '/..') | realpath) + '/' }}"
            dest: "{{ app_root }}/"
            delete: true
            recursive: true
            rsync_opts:
              - "--exclude=.git"
              - "--exclude=.idea"
              - "--exclude=.vscode"
              - "--exclude=deploy/inventory/*.ini"

        - name: Verify go.mod exists on remote
          ansible.builtin.stat:
            path: "{{ app_root }}/go.mod"
          register: go_mod_stat

        - name: Fail when go.mod is missing
          ansible.builtin.fail:
            msg: "Missing {{ app_root }}/go.mod after sync. Check synchronize src path and inventory target."
          when: not go_mod_stat.stat.exists

        - name: Ensure bin directory exists
          ansible.builtin.file:
            path: "{{ app_root }}/bin"
            state: directory
            mode: "0755"

        - name: Validate local build binary path is provided
          ansible.builtin.assert:
            that:
              - local_build_bin is defined
              - (local_build_bin | length) > 0
            fail_msg: "local_build_bin is required. Use make targets that pass -e local_build_bin=..."

        - name: Check local build binary exists on control node
          ansible.builtin.stat:
            path: "{{ local_build_bin }}"
          delegate_to: localhost
          become: false
          register: local_build_bin_stat

        - name: Fail when local build binary is missing
          ansible.builtin.fail:
            msg: "Local build binary not found: {{ local_build_bin }}. Run local build first."
          when: not local_build_bin_stat.stat.exists

        - name: Upload locally built nexo_im binary
          ansible.builtin.copy:
            src: "{{ local_build_bin }}"
            dest: "{{ app_root }}/bin/nexo_im"
            mode: "0755"

        - name: Render supervisor config
          ansible.builtin.template:
            src: templates/nexo_im.supervisor.conf.j2
            dest: "{{ supervisor_conf_path }}"
            mode: "0644"

        - name: Reread supervisor configs
          ansible.builtin.command: supervisorctl reread
          changed_when: true

        - name: Update supervisor program list
          ansible.builtin.command: supervisorctl update
          changed_when: true

        - name: Restart nexo_im
          ansible.builtin.command: supervisorctl restart "{{ app_name }}"
          changed_when: true
      rescue:
        - name: Ensure bin directory exists for rollback
          ansible.builtin.file:
            path: "{{ app_root }}/bin"
            state: directory
            mode: "0755"

        - name: Restore previous nexo_im binary
          ansible.builtin.command: >
            cp -a
            "{{ shared_root }}/rollback/{{ app_name }}/nexo_im.bak"
            "{{ app_root }}/bin/nexo_im"
          when: nexo_im_current_bin.stat.exists
          changed_when: true

        - name: Roll back nexo_im process to previous binary
          ansible.builtin.command: supervisorctl restart "{{ app_name }}"
          when: nexo_im_current_bin.stat.exists
          changed_when: true

        - name: Abort deploy after rollback
          ansible.builtin.fail:
            msg: "Deployment failed. Rolled back to previous binary and restarted {{ app_name }}."
